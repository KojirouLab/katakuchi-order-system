<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カタクチ商店 受発注システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #0d6b58;
    --primary-dark: #0a5545;
    --bg: #f7f7f5;
    --card-bg: #ffffff;
    --border: #e2e2de;
    --text: #2a2a28;
    --hint: #767671;
    --danger: #c0392b;
    --success: #1e7a3d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  h1 {
    font-size: 22px;
    margin: 8px 0 4px;
  }
  h2 {
    font-size: 16px;
    margin: 0 0 12px;
  }
  h2.section-title {
    margin: 24px 4px 8px;
    padding-top: 4px;
    border-top: 2px solid var(--primary);
    padding-top: 12px;
  }
  h2.section-title:first-child {
    margin-top: 4px;
    border-top: none;
    padding-top: 0;
  }
  .hint {
    color: var(--hint);
    font-size: 13px;
    line-height: 1.6;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin: 16px 0;
  }
  .field {
    margin-bottom: 14px;
  }
  .field-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .field-row .field {
    flex: 1;
    min-width: 90px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    font-family: inherit;
  }
  textarea {
    resize: vertical;
  }
  button.primary {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: var(--primary);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button.primary:active {
    background: var(--primary-dark);
  }
  button.primary:disabled {
    opacity: 0.6;
  }
  button.secondary {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--danger);
    background: #fff;
    border: 1px solid var(--danger);
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
  }
  button.secondary:disabled {
    opacity: 0.5;
  }
  .msg {
    min-height: 20px;
    font-size: 13px;
    margin-top: 10px;
  }
  .msg-success { color: var(--success); }
  .msg-error { color: var(--danger); }
  .home-links {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .home-links li {
    border-bottom: 1px solid var(--border);
  }
  .home-links li:last-child {
    border-bottom: none;
  }
  .home-links a {
    display: block;
    padding: 12px 4px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }
  .recent-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .recent-list li {
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
  }
  .recent-list li:last-child {
    border-bottom: none;
  }
  .recent-list li.clickable {
    cursor: pointer;
  }
  .recent-list li.clickable:active {
    background: #f0f0ec;
  }
  .recent-date {
    display: block;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 3px;
  }
  .recent-store {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .recent-body {
    display: block;
    font-size: 14px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="storage.js?v=202607091540"></script>
<script src="app.js?v=202607091540"></script>
</body>
</html>
